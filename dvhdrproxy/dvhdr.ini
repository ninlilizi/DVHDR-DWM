; ============================================================================
;  dvhdr.ini — runtime configuration for the DVHDR dxgi.dll proxy.
;
;  Drop this file next to dxgi.dll (i.e. next to the game executable). The proxy
;  reads it once when the game starts. Defaults below mirror DVHDR.fx in the
;  FFXIV-Dynamic-HDR ReShade project.
;
;  The effect only engages on HDR back buffers: scRGB FP16 (R16G16B16A16_FLOAT)
;  and HDR10 (R10G10B10A2_UNORM). SDR games pass through untouched. The game
;  must already be running in HDR for the tonemapper to have anything to shape.
; ============================================================================

[Source]
; 0 = Auto-detect from the back-buffer format (FP16 -> scRGB, R10G10B10A2 ->
;     HDR10). 1 = force scRGB FP16. 2 = force HDR10 PQ.
ColorSpace = 0


[Display]
; Panel peak luminance (nits). Sparse highlights are tone-mapped toward this.
Peak = 1300.0

; Maximum sustained frame-average luminance (nits) the panel can hold without
; its ABL pulling the image down. For QD-OLED this is far below the spec peak.
MaxFALL = 265.0

; Minimum luminance of the panel (nits). 0 for OLED.
Black = 0.0

; Black-level lift (nits). Raises the black floor to this many nits while
; pulling the ceiling (MaxCLL) back down by the same amount, so the result stays
; exactly within [BlackLift, Peak] and nothing clips. Pure black becomes a faint
; neutral grey. For panels that crush detail right at the bottom of their range /
; cannot cleanly drive near-zero. 0 = disabled.
BlackLift = 0.00248


[Governor]
; Target frame-average as a percentage of MaxFALL. Lower = safer ABL margin.
HeadroomPercent = 90.0

; Lower bound on global gain when compressing a too-bright scene.
MinGain = 0.25

; How much to brighten dim scenes. 0 = pure highlight protection (no lift).
LiftStrength = 0.25

; Upper bound on global gain when lifting dim scenes.
MaxGain = 1.5

; Above this luminance (nits) the dark-scene lift fades to none.
HighlightProtect = 1.0

; Luminance percentile treated as the scene peak (ignores firefly pixels).
PeakPercentile = 99.7


[Temporal]
; Time constant (ms) when the scene brightens. Short = react quickly to ABL.
AttackMs = 80.0

; Time constant (ms) when the scene darkens. Long = settle gently, no pumping.
ReleaseMs = 600.0


[ToneCurve]
; Restores contrast lost when shadows are lifted. 0 = off, 1.5 = strong.
DynamicContrast = 0.2

; Restores local detail flattened by the shadow lift. 0 = off, 1 = strong.
LocalContrast = 0.35

; Neighbourhood radius (pixels) for the local-contrast mean.
LocalContrastRadius = 12.0

; 1.0 = only lighten pixels brighter than their neighbours (halo-resistant).
LocalContrastBias = 1.0

; 1 = apply BT.2390 highlight rolloff above DisplayPeak. 0 = hard clip.
UseHighlightRolloff = 1

; Blend with the original (1.0 = full DVHDR, 0.0 = pass-through).
Strength = 1.0


[Performance]
; Sample every Nth pixel for the histogram analyzer. 1 = every pixel,
; 2 = quarter the work, 4 = sixteenth.
AnalyzeStride = 2


[Dither]
; Blue-noise dither aimed at masking panel posterisation in hot highlights.
ThresholdNits = 600.0
StrengthNits = 20.0
GradBoost = 2.0


[Debug]
; 0 = Off, 1 = Histogram + markers overlay in the bottom-left,
; 2 = solid red over presented pixels (write-path canary).
Overlay = 0
