; ============================================================================
;  dvhdr.ini — runtime configuration for DVHDR-DWM.
;
;  Edit values then run `dvhdrloader --force` to reload — the loader copies
;  this file alongside dvhdr.dll into %SYSTEMROOT%\Temp\, where the injected
;  payload reads it on attach. (Defaults below mirror DVHDR.fx in the
;  FFXIV-Dynamic-HDR ReShade project.)
;
;  Monitor selection is configured separately via `dvhdrloader -m N` — that
;  lives in HKLM\SOFTWARE\DVHDR-DWM and is not part of this file.
; ============================================================================

[Display]
; Panel peak luminance (nits). Sparse highlights are tone-mapped toward this.
Peak = 1300.0

; Maximum sustained frame-average luminance (nits) the panel can hold without
; its ABL pulling the image down. For QD-OLED, this is typically far below
; the spec sheet's peak number.
MaxFALL = 265.0

; Minimum luminance of the panel (nits). 0 for OLED.
Black = 0.0


[Source]
; 0 = Auto detect (defaults to scRGB), 1 = scRGB FP16, 2 = HDR10 PQ
ColorSpace = 0


[Governor]
; Target frame-average as a percentage of MaxFALL. Lower = safer ABL margin.
HeadroomPercent = 90.0

; Lower bound on global gain when compressing a too-bright scene.
; Larger value = less aggressive dimming permitted.
MinGain = 0.25

; How much to brighten dim scenes. 0 = pure highlight protection (no lift).
LiftStrength = 0.25

; Upper bound on global gain when lifting dim scenes.
MaxGain = 1.5

; Above this luminance (nits) the dark-scene lift fades to none — so UI and
; in-game highlights keep their authored brightness. Protection ramps in
; across 50%–100% of this value: full lift below HighlightProtect/2, smooth
; smoothstep fade to passthrough at HighlightProtect.
HighlightProtect = 1.0

; Luminance percentile treated as the scene peak. Below 100 ignores firefly
; pixels that would otherwise dominate the peak estimate.
PeakPercentile = 99.7


[Temporal]
; Time constant (ms) when the scene brightens. Short = react quickly to ABL.
AttackMs = 80.0

; Time constant (ms) when the scene darkens. Long = settle gently, no pumping.
ReleaseMs = 600.0


[ToneCurve]
; Restores contrast lost when shadows are lifted. 0 = off, 1.5 = strong.
;DynamicContrast = 0.1
DynamicContrast = 0.25


; Restores local detail flattened by the shadow lift. 0 = off, 1 = strong.
LocalContrast = 0.35

; Neighbourhood radius (pixels) for the local-contrast mean. Higher = macro
; "clarity" feel; lower = fine-grained acutance.
LocalContrastRadius = 12.0

; 1.0 = only lighten pixels brighter than their neighbours (halo-resistant).
; 0.0 = symmetric, also deepening below-mean pixels.
LocalContrastBias = 1.0

; 1 = apply BT.2390 highlight rolloff above DisplayPeak. 0 = hard clip.
UseHighlightRolloff = 1

; Blend with the original (1.0 = full DVHDR, 0.0 = pass-through).
Strength = 1.0


[Performance]
; Sample every Nth pixel for the histogram analyzer. 1 = every pixel,
; 2 = quarter the work, 4 = sixteenth.
AnalyzeStride = 2


[Dither]
; Blue-noise dither aimed at masking panel posterisation in hot highlights.
; Above ThresholdNits the dither ramps up linearly toward DisplayPeak, with
; extra strength boosted at high-frequency luma transitions (edges).

; Luminance (nits) at which dither begins to engage. Below this value no
; dither is applied. Tune to where your panel begins to band — for the
; PG39WCDM that is ~700 nits.
ThresholdNits = 600.0

; Peak amplitude of the dither in nits at full strength. Larger = noisier
; but smoother gradients in hot regions. Typical: 4–20.
StrengthNits = 20.0

; How much the dither amplitude is boosted in regions with high-frequency
; luma variation between neighbouring pixels (edges, sharp transitions).
; 0 = uniform dither everywhere above threshold; higher = stronger at edges.
GradBoost = 2.0


[Debug]
; 0 = Off, 1 = Histogram + markers overlay in the bottom-left,
; 2 = solid red over presented pixels (write-path canary).
Overlay = 0
