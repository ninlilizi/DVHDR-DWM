; ============================================================================
;  dvhdr.ini — runtime configuration for DVHDR-DWM.
;
;  Edit values then run `dvhdrloader --force` to reload — the loader copies
;  this file alongside dvhdr.dll into %SYSTEMROOT%\Temp\, where the injected
;  payload reads it on attach. (Defaults below mirror DVHDR.fx in the
;  FFXIV-Dynamic-HDR ReShade project.)
;
;  Monitor selection is configured separately via `dvhdrloader -m N` — that
;  lives in HKLM\SOFTWARE\DVHDR-DWM and is not part of this file.
; ============================================================================

[Display]
; Panel peak luminance (nits). Sparse highlights are tone-mapped toward this.
;Peak = 1300.0

; Maximum sustained frame-average luminance (nits) the panel can hold without
; its ABL pulling the image down. For QD-OLED, this is typically far below
; the spec sheet's peak number.
;MaxFALL = 265.0

; Minimum luminance of the panel (nits). 0 for OLED.
;Black = 0.0

; Black-level lift (nits). Raises the black floor to this many nits while
; pulling the ceiling (MaxCLL) back down by the same amount, so the result stays
; exactly within [BlackLift, Peak] and nothing clips. Pure black becomes a faint
; neutral grey. For panels that crush detail right at the bottom of their range /
; cannot cleanly drive near-zero. 0 = disabled.
;BlackLift = 0.00248

; --- Per-monitor capabilities (multi-screen) ---------------------------------
; When you tonemap several screens at once (e.g. `dvhdrloader -m 1,3`), each panel
; can declare its own capabilities in a [Display.N] section, where N is the
; Windows display number from `dvhdrloader --list`. Only the panel-capability
; keys are read per-monitor — Peak, MaxFALL, Black, BlackLift — and any key
; omitted there inherits the global [Display] value above. Every other setting
; ([Governor], [ToneCurve], etc.) is shared across all selected screens.
; Uncomment and adjust to taste:
;
[Display.1]
Peak = 1300
MaxFALL = 265
Black = 0.0
BlackLift = 0.00248
;
[Display.2]
Peak = 390
MaxFALL = 390
Black = 0.025
BlackLift = 0.0


[Source]
; 0 = Auto detect (defaults to scRGB), 1 = scRGB FP16, 2 = HDR10 PQ
ColorSpace = 0


[Governor]
; Target frame-average as a percentage of MaxFALL. Lower = safer ABL margin.
HeadroomPercent = 90.0

; Lower bound on global gain when compressing a too-bright scene.
; Larger value = less aggressive dimming permitted.
MinGain = 0.25

; How much to brighten dim scenes. 0 = pure highlight protection (no lift).
LiftStrength = 0.25

; Upper bound on global gain when lifting dim scenes.
MaxGain = 1.5

; Above this luminance (nits) the dark-scene lift fades to none — so UI and
; in-game highlights keep their authored brightness. The lift eases smoothly in
; PQ from full at black to none at this value (a wide perceptual band). NOTE: the
; lift only engages when the scene is dimmer than the FALL target (MaxFALL ×
; Headroom%); this knob only shapes where an active lift fades — it cannot
; force one on an already-bright scene.
HighlightProtect = 80.0

; Shadow toe (nits). Below this luminance the lift eases back to identity slope,
; so the deepest blacks keep the source's own gradation instead of being
; amplified by the gain into a contouring "cliff" just above black. 0 = off.
ShadowToe = 0.25

; Luminance percentile treated as the scene peak. Below 100 ignores firefly
; pixels that would otherwise dominate the peak estimate.
PeakPercentile = 99.7


[Temporal]
; Time constant (ms) when the scene brightens. Short = react quickly to ABL.
AttackMs = 80.0

; Time constant (ms) when the scene darkens. Long = settle gently, no pumping.
ReleaseMs = 600.0


[ToneCurve]
; Macro contrast — a smooth S-curve applied to the low-pass BASE about the lifted
; scene average, shaping large-scale tonal separation. 0 = off, 1.5 = strong.
DynamicContrast = 0.2

; Detail gain — the per-pixel perceptual contrast (everything finer than the base
; radius below) is re-added onto the lifted base at this gain. 1.0 = preserve
; exactly so lightened pixels keep their contrast, >1 = enhance/sharpen, 0 = off
; (flat lift). This IS the contrast-preserving local tonemap.
DetailGain = 1.0

; Base/detail split radius (pixels) — the low-pass separating "base" tone from
; "detail". Larger = smoother base, more detail preserved, softer halos at strong
; edges; smaller = finer, less halo.
DetailRadius = 12.0

; Damps below-base (darker-than-neighbourhood) detail to resist haloing at strong
; edges. 0.0 = symmetric (true contrast preservation); 1.0 = only re-add
; brighter-than-base detail.
DetailBias = 0.0

; Lift locality — where the dark-scene lift takes its reference. 0 = region: lifts
; dark AREAS but leaves a dark pixel amid brighter content alone (preserves local
; contrast). 1 = per-pixel: every dark tone lifts (more visible on mixed/desktop
; content, but flattens local contrast). 0.5 = balance.
LiftLocality = 0.0

; 1 = apply BT.2390 highlight rolloff above DisplayPeak. 0 = hard clip.
UseHighlightRolloff = 1

; Blend with the original (1.0 = full DVHDR, 0.0 = pass-through).
Strength = 1.0


[Color]
; ICtCp (DICE-style) recombine — as luminance is lifted or compressed, chroma is
; scaled to hold perceived saturation through the curve so colours stay vivid and
; hue-true instead of washing toward white (on lift) or clipping to a hue-shifted
; edge (on compression). 1.0 = full preservation, 0.0 = intensity only.
ChromaCorrect = 1.0


[Performance]
; Sample every Nth pixel for the histogram analyzer. 1 = every pixel,
; 2 = quarter the work, 4 = sixteenth.
AnalyzeStride = 2


[Dither]
; Blue-noise output dither to break the panel's quantisation banding at ALL
; levels, in luma AND chroma. Per-channel noise sized to one perceptual (PQ)
; code step, gated by local neighbourhood variance so flat fields stay clean
; while any region containing gradation (where banding shows) is broken up.

; Dither amplitude in 10-bit code steps. 0 = off. ~1-2 is typical; raise for
; 8-bit panels, lower for 12-bit.
Strength = 1.5

; Local PQ variance at which the dither reaches full strength. Smaller = more
; sensitive (engages on fainter gradients); larger = only stronger gradients.
Activity = 0.002

; Baseline dither fraction kept even on near-flat areas (0-1). Raise toward 1
; for full-frame dithering if wide flat bands persist; lower for cleaner flats.
Floor = 0.4


[Deband]
; Analytic debanding — reconstructs quantised gradients (contouring) before the
; lift can amplify them. Per channel in PQ: a region that is flat but stepped
; (neighbours within Threshold of the centre) is averaged smooth; genuine detail
; and edges (neighbours beyond Threshold) are left untouched.

; Detector sensitivity, in 10-bit PQ code steps. 0 = off. ~1.5-3 is typical:
; higher catches wider/coarser bands but risks softening faint real detail.
Threshold = 3.0

; Sample radius in pixels. Larger flattens broader bands but costs a little more
; and can soften if pushed too far.
Range = 16.0


[Debug]
; 0 = Off, 1 = Histogram + markers overlay in the bottom-left,
; 2 = solid red over presented pixels (write-path canary),
; 3 = show the lift base/zone as a grey ramp (black = base broken/empty).
Overlay = 0


[Dimmer]
; Idle-screen dimming — a separate feature the loader runs itself, NOT the
; injected shader. `dvhdrloader --dim N[,N,...]` watches the given display
; number(s) (the same numbering as `--list`); when nothing changes on a watched
; screen for IdleSeconds it gradually fades a transparent black overlay over that
; monitor down to Level% brightness, then fades it back to full when activity
; returns (a frame update, or the cursor moving onto it). Toggle dimming on/off
; at runtime with ToggleHotkey or the tray icon; `dvhdrloader --dim-stop` (or the
; tray's Exit item) stops the watcher.

; Idle time (seconds) with no on-screen change before a watched monitor dims.
IdleSeconds = 30

; Target brightness when fully dimmed, as a percentage (0-100). The overlay
; opacity is (1 - Level/100), so 25 leaves roughly a quarter of the picture's
; light. An approximate photometric target, not an exact measured percentage.
Level = 25

; Dim-down fade duration (seconds) — the gentle settle into shadow.
FadeSeconds = 3.0

; Wake-up fade duration (seconds) when activity resumes. Short = snappy return.
WakeFadeSeconds = 0.3

; Ignore changes inside the taskbar (its clock, tray icons, app buttons) so they
; don't keep the screen awake. 1 = discount the taskbar region, 0 = count it.
IgnoreTaskbar = 1

; Content-aware dimming. When 1, each screen remembers its own active window and,
; if that window has changing content while everything around it is still — a
; video, a dashboard, a console — only the surroundings dim (taskbar, title bars,
; desktop, idle windows) and the window is carved out and kept at full brightness.
; The memory is per-screen and sticky: focusing a window on one screen never
; disturbs another's carve-out, and a window's whole frame (its title bar included)
; counts as its own — so the title-bar recolour when it loses focus does not wake
; the screen. Moving the mouse over the active window is treated as using it, not as
; waking the dim. When a screen is wholly still, or its active window stops changing
; for IdleSeconds (or is closed / minimised / moved away), that screen dims fully as
; normal. 0 = always dim the whole screen uniformly (the original behaviour). The
; window's region eases into and out of the surrounding dim over FadeSeconds (settle)
; and WakeFadeSeconds (brighten), so the carve-out melts rather than snaps even when
; the rest of the screen is already shadowed.
ContentAware = 1

; How much of the screen must VISIBLY change to count as activity, as a percentage
; of the monitor's area. Change is measured by sampling real pixels on a sparse
; grid, so this is immune to GPU drivers that mark the whole screen "dirty" every
; frame. Tiny, frequent updates below this — a blinking text caret, a ticking
; clock, an animated icon — are ignored so they don't perpetually reset the idle
; timer. Larger = only sizeable changes (a video, a window opening) keep the screen
; awake. Moving the mouse onto the screen always wakes it regardless.
ActivityThreshold = 0.1

; Global hotkey to toggle dimming on/off while the watcher runs. Combine any of
; Ctrl/Alt/Shift/Win with a key, e.g. "Ctrl+Alt+Shift+D". Leave blank to bind no
; hotkey (the tray icon can still toggle). Note: exclusive-fullscreen games may
; swallow global hotkeys — the tray icon is the fallback.
ToggleHotkey = Ctrl+Alt+Shift+D

; Whether dimming is armed when the watcher starts. 1 = on, 0 = start disabled.
StartEnabled = 1

; Diagnostic log. 1 = write every interruption (what reset the idle timer — the
; changed area, its on-screen rectangle, plus dim/wake/toggle events) to
; "dvhdr-dimmer.log" beside the loader (or in %TEMP% if that isn't writable). Use
; it to hunt whatever keeps a screen awake: a repeating rectangle at the same
; coordinates points straight at the culprit. The tray balloon shows the exact
; log path at startup. 0 = off.
Debug = 0